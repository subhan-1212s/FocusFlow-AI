<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>FocusFlow AI</title>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <span class="logo-dot animate-glow"></span>
        <h1>FocusFlow <span>AI</span></h1>
      </div>
      <div class="status-badge" id="focus-status">Tracking Active</div>
    </header>

    <main>
      <!-- Pomodoro Section -->
      <div class="pomodoro-card">
        <div class="pomo-header">
          <span class="pomo-label" id="pomo-phase">POMODORO FOCUS</span>
          <span class="pomo-session" id="pomo-session-count">Session #1</span>
        </div>
        <div class="timer-display" id="timer-display">25:00</div>
        <div class="timer-controls">
          <button id="pomo-start" class="btn-icon">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
          </button>
          <button id="pomo-pause" class="btn-icon hidden">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
          </button>
          <button id="pomo-reset" class="btn-icon-sub">
            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path></svg>
          </button>
        </div>
      </div>

      <!-- Stats Card -->
      <div class="stats-card">
        <div class="stat-row">
          <div class="stat-item">
            <span class="label">Focus Hours</span>
            <span class="value" id="today-time">0h 0m</span>
          </div>
          <div class="stat-item items-end">
            <span class="label">Blocked</span>
            <span class="value text-rose" id="blocked-count">0</span>
          </div>
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar">
            <div class="progress" id="daily-progress" style="width: 0%"></div>
          </div>
          <span class="progress-label" id="progress-percent">0% of daily goal</span>
        </div>
      </div>

      <!-- Domain Information -->
      <div class="current-site">
        <div class="site-info">
          <span class="label">Active Website</span>
          <span class="value" id="current-domain">None</span>
        </div>
        <button id="quick-block-btn" class="block-badge">Block Site</button>
      </div>

      <!-- Main Actions -->
      <div class="actions">
        <button id="toggle-focus" class="btn primary animate-hover">Enable Focus Mode</button>
        <button id="open-dashboard" class="btn secondary">Open FocusFlow Dashboard</button>
      </div>
    </main>

    <footer>
      <p>FocusFlow AI v1.0 • Designed for high achievers</p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
